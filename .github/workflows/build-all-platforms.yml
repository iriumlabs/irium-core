name: Build All Platforms

# Triggered by version tags (git tag v1.2.3 && git push --tags)
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required for tauri-action to create the GitHub release and upload artifacts.
# GitHub repos default GITHUB_TOKEN to read-only for `contents`, which was the
# root cause of the v1.0.0 first-run failure on this workflow.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    name: Build Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          # macOS Intel (macos-13) dropped: GitHub's last Intel runner is on
          # its deprecation runway and queue times are now multi-hour. Intel
          # Mac users can run the arm64 .dmg under Rosetta 2.

    runs-on: ${{ matrix.os }}

    steps:
      # MUST run before checkout — otherwise Windows runners' default
      # core.autocrlf=true silently converts irium-source/bootstrap/seedlist.txt
      # and its .sig from LF to CRLF on checkout. Those files get embedded
      # into the iriumd binary via include_str! at compile time, so any CRLF
      # corruption gets baked in and breaks signature verification at runtime
      # on every Windows user's machine (root cause of v1.0.0 Windows users
      # seeing "[warn] bootstrap signed seedlist signature invalid").
      - name: Force LF line endings before checkout (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      # Fetch irium-source submodule so node binaries can be built from source.
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Belt-and-suspenders: strip any stray \r from the signed bootstrap files
      # before cargo runs. include_str! reads file bytes verbatim, so even a
      # single \r anywhere in these files breaks signature verification.
      - name: Normalize bootstrap signed files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          @(
            'irium-source\bootstrap\seedlist.txt',
            'irium-source\bootstrap\seedlist.txt.sig',
            'irium-source\bootstrap\banned_peers.sample',
            'irium-source\bootstrap\banned_peers.sample.sig',
            'irium-source\bootstrap\trust\allowed_signers',
            'irium-source\bootstrap\trust\allowed_anchor_signers',
            'irium-source\bootstrap\trust\allowed_ban_signers'
          ) | ForEach-Object {
            if (Test-Path $_) {
              $bytes    = [IO.File]::ReadAllBytes($_)
              $stripped = [byte[]]($bytes | Where-Object { $_ -ne 13 })
              [IO.File]::WriteAllBytes($_, $stripped)
              Write-Host ("  normalized {0}: {1} -> {2} bytes" -f $_, $bytes.Length, $stripped.Length)
            }
          }

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            ocl-icd-opencl-dev \
            opencl-headers

      # Windows runners do not ship OpenCL.lib by default — without it the
      # `gpu` cargo feature fails at the link step with LNK1181 and the
      # bundled irium-miner-gpu-x86_64-pc-windows-msvc.exe never gets a
      # fresh build. The OCL_SDK_Light zip URL this step previously
      # downloaded returns 404 (releases/download/1.0/lightOCLSDK.zip);
      # AMD's only published asset is an interactive .exe installer
      # that needs admin + user clicks and is unusable in CI.
      #
      # Synthesize the import library locally instead: dumpbin /exports
      # against System32\OpenCL.dll (present on every Windows install,
      # it's the OpenCL ICD loader) emits the export table; lib.exe /def
      # turns that into an import library. Both tools ship with the
      # MSVC build tools that are already on the windows-latest runner.
      # Result lands at the path cl-sys's build.rs probes via the
      # INTELOCLSDKROOT env var. Same pattern as irium-source's
      # release.yml.
      - name: Generate OpenCL.lib from system OpenCL.dll (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $vsRoot = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $msvcDir = Get-ChildItem "$vsRoot\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $msvcDir) { throw "No MSVC toolchain under $vsRoot" }
          $msvcBin = "$($msvcDir.FullName)\bin\HostX64\x64"
          $stubRoot = Join-Path $env:RUNNER_TEMP 'opencl-stub'
          $libDir = Join-Path $stubRoot 'lib\x64'
          New-Item -ItemType Directory -Path $libDir -Force | Out-Null
          Push-Location $env:RUNNER_TEMP
          & "$msvcBin\dumpbin.exe" /exports C:\Windows\System32\OpenCL.dll | Out-File -Encoding ASCII opencl-exports.txt
          $def = New-Object System.Collections.Generic.List[string]
          $def.Add('LIBRARY OpenCL')
          $def.Add('EXPORTS')
          $inSec = $false
          foreach ($l in Get-Content opencl-exports.txt) {
            if ($l -match '^\s+ordinal\s+hint') { $inSec = $true; continue }
            if ($inSec) {
              if ($l -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') { $def.Add('    ' + $matches[1]) }
              elseif ($l -match '^\s+Summary') { break }
            }
          }
          $def | Out-File -Encoding ASCII OpenCL.def
          & "$msvcBin\lib.exe" /def:OpenCL.def /out:"$libDir\OpenCL.lib" /machine:x64
          Pop-Location
          if (-not (Test-Path "$libDir\OpenCL.lib")) { throw 'OpenCL.lib generation failed' }
          Write-Host "Generated OpenCL.lib at $libDir\OpenCL.lib ($((Get-Item "$libDir\OpenCL.lib").Length) bytes)"
          # Belt: cl-sys's Windows build.rs does not consult INTELOCLSDKROOT; it
          # hardcodes "C:\Program Files (x86)\OCL_SDK_Light\lib\x86_64" as a
          # search path. Mirror the synthesized lib there too.
          $oclSdkLightLib = "C:\Program Files (x86)\OCL_SDK_Light\lib\x86_64"
          New-Item -ItemType Directory -Path $oclSdkLightLib -Force | Out-Null
          Copy-Item "$libDir\OpenCL.lib" (Join-Path $oclSdkLightLib "OpenCL.lib") -Force
          Write-Host "Mirrored OpenCL.lib to $oclSdkLightLib (cl-sys fallback)"
          "INTELOCLSDKROOT=$stubRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Cache both the GUI crate and the irium node crate independently so
      # incremental compilation works across runs.
      # cache-bin: false — dtolnay/rust-toolchain installs cargo into
      # ~/.cargo/bin BEFORE this step runs. Restoring a cached bin dir
      # overwrites the freshly installed cargo shim with a stale one from
      # a previous run, which on macos-15-arm64 resolves to rustup-init
      # and fails with "unexpected argument 'build'". Excluding bin from
      # the cache lets the toolchain action's install always win.
      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            irium-source -> target
            src-tauri -> target
          cache-bin: false

      - name: Install npm dependencies
        run: npm ci

      # Capture the current GPU binary's SHA-256 so the post-build verify
      # step can detect "cargo build --features gpu silently failed". If
      # the hash hasn't changed after the build, the installer would ship
      # the stale binary checked out from git HEAD.
      - name: Capture pre-build GPU binary hash (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $f = "src-tauri/binaries/irium-miner-gpu-x86_64-pc-windows-msvc.exe"
          $h = if (Test-Path $f) { (Get-FileHash $f -Algorithm SHA256).Hash.ToLower() } else { "__missing__" }
          "GPU_PREBUILD_SHA=$h" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Pre-build GPU sha=$h"

      # Compile iriumd, irium-wallet, irium-miner from source.
      # First build: 30–90 min; subsequent runs use the Rust cache above.
      - name: Build irium node binaries
        run: node scripts/build-irium-node.js

      # build-irium-node.js intentionally swallows GPU build failures with
      # only a warning so local devs without OpenCL can still build the
      # core binaries. CI must fail loud — otherwise the Windows installer
      # silently ships whatever stale GPU binary is in git HEAD.
      - name: Verify GPU binary was rebuilt (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $f = "src-tauri/binaries/irium-miner-gpu-x86_64-pc-windows-msvc.exe"
          $now = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
          if ($now -eq $env:GPU_PREBUILD_SHA) {
            throw "GPU binary unchanged during CI build (sha=$now). cargo build --features gpu silently failed - investigate before shipping."
          }
          Write-Host "GPU binary rebuilt OK (sha=$now)"

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing secrets for the Tauri v1 in-app updater. Both are required:
          # tauri-action signs every platform installer with the private key and
          # auto-generates `latest.json` (manifest + signatures per platform) as a
          # release asset, which is what the running client polls via the
          # `endpoints` entry in tauri.conf.json. Missing either secret causes
          # tauri-action to skip signing silently — users on installed builds
          # will then see "signature verification failed" on every update.
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Irium Core {0}', github.ref_name) || '' }}
          releaseBody: |
            Build in progress — release notes will be updated automatically.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # ── Publish-release: consolidates the matrix into one final state ─────
  # tauri-action@v0 creates each release as a draft and tries to unset
  # the draft flag at the end of each matrix job's upload. When matrix
  # jobs race or any one fails between create-release and set-draft-false,
  # the release can be left stuck as a draft.
  #
  # This job runs once, ONLY after every matrix build succeeded
  # (needs: build-tauri), and authoritatively does two things:
  #   1. Regenerates the release body from the git log between the
  #      previous tag and this one — every release gets accurate notes
  #      reflecting what actually changed, not the static placeholder
  #      tauri-action seeded.
  #   2. Sets draft=false to publish the release.
  #
  # gh release edit is idempotent — setting draft=false on an already
  # published release is a no-op, and overwriting notes with the same
  # content is harmless. So even if tauri-action's own end-of-job patch
  # already ran for one or more platforms, this job is the final source
  # of truth.
  publish-release:
    name: Publish release (consolidate draft, regenerate notes)
    needs: build-tauri
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for git describe)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate notes from commits and unset draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent tag that is an ancestor of the parent
          # of the current tag's commit. Falls back to empty string when
          # this is the very first tag in the repo's history.
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:'- %s' --no-merges)
            HEADER="**Changes since ${PREV_TAG}:**"
          else
            NOTES="- Initial release."
            HEADER="**Changes:**"
          fi
          BODY=$(printf '%s\n\n%s\n' "$HEADER" "$NOTES")
          # Single PATCH that overwrites the body AND clears the draft
          # flag. Both side effects land atomically from the API's
          # perspective so users never see a half-finalized release.
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --notes "$BODY" \
            --repo "${{ github.repository }}"
