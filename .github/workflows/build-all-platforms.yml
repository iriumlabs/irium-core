name: Build All Platforms

# Triggered by version tags (git tag v1.2.3 && git push --tags)
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required for tauri-action to create the GitHub release and upload artifacts.
# GitHub repos default GITHUB_TOKEN to read-only for `contents`, which was the
# root cause of the v1.0.0 first-run failure on this workflow.
permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          # macOS Intel (macos-13) dropped: GitHub's last Intel runner is on
          # its deprecation runway and queue times are now multi-hour. Intel
          # Mac users can run the arm64 .dmg under Rosetta 2.

    runs-on: ${{ matrix.os }}

    steps:
      # Fetch irium-source submodule so node binaries can be built from source.
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      # Cache both the GUI crate and the irium node crate independently so
      # incremental compilation works across runs.
      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            irium-source -> target
            src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # Compile iriumd, irium-wallet, irium-miner from source.
      # First build: 30–90 min; subsequent runs use the Rust cache above.
      - name: Build irium node binaries
        run: node scripts/build-irium-node.js

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Irium Core ${{ github.ref_name }}'
          releaseBody: |
            Initial public release of Irium Core, the official full-node desktop wallet and miner for the Irium (IRM) blockchain.

            ## Features

            - Wallet — create, import, and manage Irium wallets locally with full private-key control. Send and receive IRM, view transaction history, back up and restore wallet files.
            - Miner — integrated CPU, GPU (OpenCL), and ASIC/Stratum-pool mining. Live hashrate chart, blocks-found counter, uptime tracking, and a live block-info strip showing the current block being mined, previous block hash, block time, and network difficulty, polled from the local node every three seconds.
            - Settlement — on-chain proof-based settlements with OTC, freelance, milestone, and deposit templates.
            - Marketplace — peer-to-peer offer feed for trustless trades across the Irium network.
            - RPC connection — routes through Tauri's HTTP API so node requests bypass the renderer CSP and the node's CORS-off default. Works against a locally-run iriumd at 127.0.0.1:38300.
            - Themes — four selectable color palettes: Midnight, Obsidian, Aurora, Nebula.
            - Network background — animated constellation aurora with depth-parallax particles and a radial mask that keeps the animation out of the main content area.

            ## Installers

            - Windows: NSIS .exe and .msi (x64)
            - macOS: .dmg (Intel and Apple Silicon)
            - Linux: .deb and .AppImage (x64)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
