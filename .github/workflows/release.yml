name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo workspaces
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            irium-source

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build iriumd sidecar binaries
        run: npm run build:node

      - name: Build, package, and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Irium Core ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            Initial public release of Irium Core, the official full-node desktop wallet and miner for the Irium (IRM) blockchain.

            ## Features

            - Wallet — create, import, and manage Irium wallets locally with full private-key control. Send and receive IRM, view transaction history, back up and restore wallet files.
            - Miner — integrated CPU, GPU (OpenCL), and ASIC/Stratum-pool mining. Live hashrate chart, blocks-found counter, uptime tracking, and a live block-info strip showing the current block being mined, previous block hash, block time, and network difficulty, polled from the local node every three seconds.
            - Settlement — on-chain proof-based settlements with OTC, freelance, milestone, and deposit templates.
            - Marketplace — peer-to-peer offer feed for trustless trades across the Irium network.
            - RPC connection — routes through Tauri's HTTP API so node requests bypass the renderer CSP and the node's CORS-off default. Works against a locally-run iriumd at 127.0.0.1:38300.
            - Themes — four selectable color palettes: Midnight, Obsidian, Aurora, Nebula.
            - Network background — animated constellation aurora with depth-parallax particles and a radial mask that keeps the animation out of the main content area.

            ## Installers

            - Windows: NSIS .exe and .msi (x64)
            - macOS: .dmg (Intel and Apple Silicon)
            - Linux: .deb and .AppImage (x64)
